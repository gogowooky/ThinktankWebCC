<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat - Thinktank</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1e1e1e; color: #ccc;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px; line-height: 1.6;
  height: 100vh; overflow: hidden;
}
.chat-app {
  display: flex; flex-direction: column;
  height: 100vh;
}
.chat-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: #252526;
  border-bottom: 1px solid #333;
  font-size: 12px; color: #999;
}
.chat-header button {
  background: #3c3c3c; color: #ccc;
  border: 1px solid #555; border-radius: 4px;
  padding: 2px 10px; cursor: pointer;
  font-size: 11px;
}
.chat-header button:hover { background: #4c4c4c; }
.chat-header .save-btn { background: #264f78; border-color: #007acc; }
.chat-header .save-btn:hover { background: #2d6a9f; }
.chat-header .save-btn:disabled { background: #333; border-color: #555; color: #666; cursor: not-allowed; }
.chat-header-spacer { flex: 1; }
.chat-context-bar {
  padding: 6px 12px;
  background: #1a2a3a;
  border-bottom: 1px solid #264f78;
  font-size: 11px; color: #88b0d0;
  max-height: 80px; overflow-y: auto;
}
.chat-context-bar .ctx-label { color: #4fc1ff; font-weight: bold; }
.chat-context-bar .ctx-item { margin-left: 8px; }
.chat-messages {
  flex: 1; overflow-y: auto;
  padding: 12px 16px;
  display: flex; flex-direction: column;
  gap: 8px;
}
.chat-message {
  max-width: 85%;
  padding: 8px 12px;
  border-radius: 8px;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.chat-message.user {
  align-self: flex-end;
  background: #264f78;
  color: #e0e0e0;
}
.chat-message.assistant {
  align-self: flex-start;
  background: #2d2d30;
  color: #ccc;
}
.chat-message.assistant h1,
.chat-message.assistant h2,
.chat-message.assistant h3 { color: #e0e0e0; margin: 0.6em 0 0.3em; }
.chat-message.assistant h1 { font-size: 1.3em; }
.chat-message.assistant h2 { font-size: 1.15em; }
.chat-message.assistant h3 { font-size: 1.05em; }
.chat-message.assistant p { margin: 0.3em 0; }
.chat-message.assistant ul, .chat-message.assistant ol { margin: 0.3em 0; padding-left: 1.5em; }
.chat-message.assistant li { margin: 0.15em 0; }
.chat-message.assistant code { background: #1e1e1e; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
.chat-message.assistant pre { background: #1e1e1e; padding: 8px; border-radius: 4px; overflow-x: auto; margin: 0.4em 0; white-space: pre; }
.chat-message.assistant pre code { background: none; padding: 0; }
.chat-message.assistant a { color: #4fc1ff; }
.chat-message.assistant strong { color: #e0e0e0; }
.chat-message .msg-time {
  font-size: 10px; color: #666;
  margin-top: 4px; text-align: right;
}
.chat-message.streaming::after {
  content: ''; display: inline-block;
  width: 6px; height: 14px;
  background: #888; margin-left: 2px;
  animation: blink 0.7s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.chat-input-area {
  display: flex; gap: 8px;
  padding: 8px 12px;
  background: #252526;
  border-top: 1px solid #333;
}
.chat-input-area textarea {
  flex: 1;
  background: #1e1e1e; color: #ccc;
  border: 1px solid #444; border-radius: 6px;
  padding: 8px 10px;
  font-family: inherit; font-size: 14px;
  resize: none; outline: none;
  min-height: 36px; max-height: 120px;
}
.chat-input-area textarea:focus { border-color: #007acc; }
.chat-input-area button {
  background: #007acc; color: #fff;
  border: none; border-radius: 6px;
  padding: 0 16px;
  cursor: pointer; font-size: 14px;
  white-space: nowrap;
}
.chat-input-area button:hover { background: #0098ff; }
.chat-input-area button:disabled { background: #555; cursor: not-allowed; }

.chat-empty {
  flex: 1; display: flex;
  align-items: center; justify-content: center;
  color: #666; font-size: 15px;
}
.error { color: #ff6b6b; text-align: center; padding: 20px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1e1e1e; }
::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }
</style>
</head>
<body>
<div class="chat-app">
  <div class="chat-header">
    <span id="headerTitle">Chat</span>
    <span class="chat-header-spacer"></span>
    <button class="save-btn" id="saveMemoBtn" onclick="saveToMemo()" disabled>メモに保存</button>
  </div>
  <div id="contextBar" class="chat-context-bar" style="display:none;"></div>
  <div id="messages" class="chat-messages">
    <div class="chat-empty">メッセージを入力してチャットを開始</div>
  </div>
  <div class="chat-input-area">
    <textarea id="input" rows="1" placeholder="メッセージを入力... (Enter で送信、Shift+Enter で改行)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
// --- Markdown変換（軽量版） ---
function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function inlineFormat(text) {
  var s = escapeHtml(text);
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/_(.+?)_/g, '<em>$1</em>');
  s = s.replace(/`(.+?)`/g, '<code>$1</code>');
  s = s.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function markdownToHtml(md) {
  var html = md;
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre><code>' + escapeHtml(code.trimEnd()) + '</code></pre>';
  });
  var lines = html.split('\n');
  var result = [];
  var inList = null;
  var inPre = false;
  function closeList() {
    if (inList === 'ul') { result.push('</ul>'); inList = null; }
    if (inList === 'ol') { result.push('</ol>'); inList = null; }
  }
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.indexOf('<pre>') >= 0) inPre = true;
    if (line.indexOf('</pre>') >= 0) { inPre = false; result.push(line); continue; }
    if (inPre) { result.push(line); continue; }
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(line.trim())) { closeList(); result.push('<hr>'); continue; }
    var hm = line.match(/^(#{1,6})\s+(.*)$/);
    if (hm) { closeList(); result.push('<h'+hm[1].length+'>'+inlineFormat(hm[2])+'</h'+hm[1].length+'>'); continue; }
    var olm = line.match(/^\d+\.\s+(.*)$/);
    if (olm) { if(inList!=='ol'){closeList();result.push('<ol>');inList='ol';} result.push('<li>'+inlineFormat(olm[1])+'</li>'); continue; }
    var ulm = line.match(/^[-*+]\s+(.*)$/);
    if (ulm) { if(inList!=='ul'){closeList();result.push('<ul>');inList='ul';} result.push('<li>'+inlineFormat(ulm[1])+'</li>'); continue; }
    if (line.trim() === '') { closeList(); result.push(''); continue; }
    closeList();
    result.push('<p>'+inlineFormat(line)+'</p>');
  }
  closeList();
  return result.join('\n');
}

// --- URL検出 ---
function detectUrls(text) {
  var urlRegex = /https?:\/\/[^\s<>"')\]]+/g;
  var matches = text.match(urlRegex);
  return matches ? Array.from(new Set(matches)) : [];
}

// --- 状態管理 ---
var params = new URLSearchParams(window.location.search);
var sessionId = params.get('session') || newSessionId();
var chatHistory = [];
var chatContext = null; // { items: [...], selection: '', urlContents: [...] }
var isSending = false;

function newSessionId() {
  var d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0') + '-' +
    String(d.getHours()).padStart(2,'0') +
    String(d.getMinutes()).padStart(2,'0') +
    String(d.getSeconds()).padStart(2,'0');
}

// --- IndexedDB ---
function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open('thinktank', 2);
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
    req.onupgradeneeded = function() { reject(new Error('DB not initialized')); };
  });
}

async function loadChat() {
  try {
    var db = await openDB();
    var tx = db.transaction('files', 'readonly');
    var store = tx.objectStore('files');
    var item = await new Promise(function(resolve, reject) {
      var req = store.get(sessionId);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
    db.close();
    if (item && item.content) {
      try {
        chatHistory = JSON.parse(item.content);
        if (item.title) document.title = item.title + ' - Chat';
      } catch(e) { chatHistory = []; }
    }
  } catch(e) {
    console.error('Failed to load chat:', e);
  }
}

async function loadContext() {
  var contextKey = '_chat_context_' + sessionId;
  try {
    var db = await openDB();
    var tx = db.transaction('files', 'readwrite');
    var store = tx.objectStore('files');
    var item = await new Promise(function(resolve, reject) {
      var req = store.get(contextKey);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
    if (item && item.content) {
      chatContext = JSON.parse(item.content);
      // コンテキストレコードを削除（一時データ）
      store.delete(contextKey);
    }
    db.close();
  } catch(e) {
    console.error('Failed to load context:', e);
  }

  if (!chatContext) return;

  // テキスト内のURL自動検出＋取得
  var allText = '';
  if (chatContext.selection) allText += chatContext.selection + '\n';
  chatContext.items.forEach(function(it) { allText += (it.content || '') + '\n'; });
  var urls = detectUrls(allText);

  if (urls.length > 0) {
    try {
      var resp = await fetch('/api/fetch-urls', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls: urls }),
      });
      if (resp.ok) {
        var data = await resp.json();
        chatContext.urlContents = data.results || [];
      }
    } catch(e) {
      console.error('Failed to fetch URLs:', e);
    }
  }

  renderContextBar();
}

function renderContextBar() {
  if (!chatContext) return;
  var bar = document.getElementById('contextBar');
  var parts = [];

  if (chatContext.items.length > 0) {
    parts.push('<span class="ctx-label">Items:</span>');
    chatContext.items.forEach(function(it) {
      parts.push('<span class="ctx-item">[' + escapeHtml(it.contentType) + '] ' + escapeHtml(it.title || it.id) + '</span>');
    });
  }
  if (chatContext.selection) {
    var sel = chatContext.selection.length > 100 ? chatContext.selection.substring(0, 100) + '...' : chatContext.selection;
    parts.push('<span class="ctx-label"> Selection:</span>');
    parts.push('<span class="ctx-item">"' + escapeHtml(sel) + '"</span>');
  }
  if (chatContext.urlContents && chatContext.urlContents.length > 0) {
    parts.push('<span class="ctx-label"> URLs:</span>');
    chatContext.urlContents.forEach(function(u) {
      var status = u.text ? '(fetched)' : '(' + (u.error || 'error') + ')';
      parts.push('<span class="ctx-item">' + escapeHtml(u.url.substring(0, 60)) + ' ' + status + '</span>');
    });
  }

  if (parts.length > 0) {
    bar.innerHTML = parts.join(' ');
    bar.style.display = 'block';
  }
}

function buildSystemPrompt() {
  if (!chatContext) return undefined;

  var prompt = 'The user has provided the following context for this conversation:\n\n';

  if (chatContext.items.length > 0) {
    prompt += '## Selected Items\n\n';
    chatContext.items.forEach(function(it) {
      prompt += '### [' + it.contentType + '] ' + (it.title || it.id) + '\n';
      prompt += (it.content || '(no content)') + '\n\n';
    });
  }

  if (chatContext.selection) {
    prompt += '## Selected Text from Editor\n\n';
    prompt += chatContext.selection + '\n\n';
  }

  if (chatContext.urlContents) {
    chatContext.urlContents.forEach(function(u) {
      if (u.text) {
        prompt += '## URL Content: ' + u.url + '\n\n';
        prompt += u.text + '\n\n';
      }
    });
  }

  prompt += 'Please respond based on the above context when relevant. Respond in the same language as the user.';
  return prompt;
}

async function saveChat() {
  try {
    var title = 'New Chat';
    if (chatHistory.length > 0) {
      var first = chatHistory.find(function(m) { return m.role === 'user'; });
      if (first) title = first.content.substring(0, 40);
    }
    document.title = title + ' - Chat';
    document.getElementById('headerTitle').textContent = title;

    var now = new Date().toISOString();
    var contentStr = JSON.stringify(chatHistory);
    var chatRecord = {
        file_id: sessionId,
        title: title,
        file_type: 'chat',
        category: 'chats',
        content: contentStr,
        metadata: null,
        size_bytes: contentStr.length,
        created_at: now,
        updated_at: now,
    };

    // IndexedDBに即時保存（dirty付き）
    var db = await openDB();
    var tx = db.transaction('files', 'readwrite');
    var store = tx.objectStore('files');
    await new Promise(function(resolve, reject) {
      var req = store.put(Object.assign({}, chatRecord, { _dirty: true }));
      req.onsuccess = function() { resolve(); };
      req.onerror = function() { reject(req.error); };
    });
    db.close();

    // BQへ非同期同期（失敗してもIndexedDBに残るため問題なし）
    fetch('/api/bq/files', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(chatRecord),
    }).then(function(res) {
      if (res.ok) {
        // BQ保存成功 → IndexedDBのdirtyフラグをクリア
        openDB().then(function(db2) {
          var tx2 = db2.transaction('files', 'readwrite');
          var store2 = tx2.objectStore('files');
          var getReq = store2.get(sessionId);
          getReq.onsuccess = function() {
            var rec = getReq.result;
            if (rec) { delete rec._dirty; store2.put(rec); }
          };
          tx2.oncomplete = function() { db2.close(); };
        });
      }
    }).catch(function(e) {
      console.warn('BQ sync failed for chat, will retry on next startup:', e);
    });

    // メインアプリに通知（DataGridに反映）
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'thinktank-item-saved', record: chatRecord }, '*');
    }
  } catch(e) {
    console.error('Failed to save chat:', e);
  }
}

// --- メモに保存 ---
async function saveToMemo() {
  if (chatHistory.length === 0) return;

  var saveMemoBtn = document.getElementById('saveMemoBtn');
  saveMemoBtn.disabled = true;
  saveMemoBtn.textContent = '保存中...';

  // 会話内容をまとめたメモを作成
  var memoContent = '# Chat Summary [Chat:' + sessionId + ']\n\n';

  chatHistory.forEach(function(msg) {
    var time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) : '';
    if (msg.role === 'user') {
      memoContent += '### 🧑 User' + (time ? ' (' + time + ')' : '') + '\n\n';
      memoContent += msg.content + '\n\n';
    } else {
      memoContent += '### 🤖 Assistant' + (time ? ' (' + time + ')' : '') + '\n\n';
      memoContent += msg.content + '\n\n';
    }
    memoContent += '---\n\n';
  });

  // メモIDを生成
  var d = new Date();
  var memoId = d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0') + '-' +
    String(d.getHours()).padStart(2,'0') +
    String(d.getMinutes()).padStart(2,'0') +
    String(d.getSeconds()).padStart(2,'0');

  var firstUserMsg = chatHistory.find(function(m) { return m.role === 'user'; });
  var memoTitle = (firstUserMsg ? firstUserMsg.content.substring(0, 30) : 'Chat') + ' [Chat:' + sessionId + ']';

  try {
    var db = await openDB();
    var tx = db.transaction('files', 'readwrite');
    var store = tx.objectStore('files');
    var now = new Date().toISOString();
    var memoRecord = {
        file_id: memoId,
        title: memoTitle,
        file_type: 'memo',
        category: 'memos',
        content: memoContent,
        metadata: null,
        size_bytes: null,
        created_at: now,
        updated_at: now,
    };
    await new Promise(function(resolve, reject) {
      var req = store.put(memoRecord);
      req.onsuccess = function() { resolve(); };
      req.onerror = function() { reject(req.error); };
    });
    db.close();

    // メインアプリに通知（DataGridに反映）
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'thinktank-item-saved', record: memoRecord }, '*');
    }

    saveMemoBtn.textContent = '保存完了';
    setTimeout(function() {
      saveMemoBtn.textContent = 'メモに保存';
      saveMemoBtn.disabled = false;
    }, 2000);
  } catch(e) {
    console.error('Failed to save memo:', e);
    saveMemoBtn.textContent = '保存失敗';
    saveMemoBtn.disabled = false;
  }
}

// --- UI ---
var messagesDiv = document.getElementById('messages');
var inputEl = document.getElementById('input');
var sendBtn = document.getElementById('sendBtn');
var saveMemoBtn = document.getElementById('saveMemoBtn');

function renderMessages() {
  if (chatHistory.length === 0) {
    messagesDiv.innerHTML = '<div class="chat-empty">メッセージを入力してチャットを開始</div>';
    saveMemoBtn.disabled = true;
    return;
  }
  messagesDiv.innerHTML = '';
  chatHistory.forEach(function(msg) {
    appendMessageEl(msg.role, msg.content, msg.timestamp);
  });
  saveMemoBtn.disabled = false;
  scrollToBottom();
}

function appendMessageEl(role, content, timestamp) {
  var div = document.createElement('div');
  div.className = 'chat-message ' + role;
  if (role === 'assistant') {
    div.innerHTML = markdownToHtml(content);
  } else {
    div.textContent = content;
  }
  if (timestamp) {
    var timeDiv = document.createElement('div');
    timeDiv.className = 'msg-time';
    timeDiv.textContent = new Date(timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
    div.appendChild(timeDiv);
  }
  messagesDiv.appendChild(div);
  return div;
}

function scrollToBottom() {
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// --- 送信 ---
async function sendMessage() {
  var text = inputEl.value.trim();
  if (!text || isSending) return;

  isSending = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  autoResize();

  var timestamp = new Date().toISOString();
  chatHistory.push({ role: 'user', content: text, timestamp: timestamp });

  var empty = messagesDiv.querySelector('.chat-empty');
  if (empty) empty.remove();

  appendMessageEl('user', text, timestamp);
  scrollToBottom();

  var assistantDiv = document.createElement('div');
  assistantDiv.className = 'chat-message assistant streaming';
  messagesDiv.appendChild(assistantDiv);
  scrollToBottom();

  var fullText = '';
  try {
    var historyForApi = chatHistory.slice(0, -1).map(function(m) {
      return { role: m.role, content: m.content };
    });

    var body = { message: text, history: historyForApi };
    var systemPrompt = buildSystemPrompt();
    if (systemPrompt) body.systemPrompt = systemPrompt;

    var response = await fetch('/api/chat/' + encodeURIComponent(sessionId) + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!response.ok) {
      var errBody = await response.text();
      throw new Error('API error: ' + response.status + ' ' + errBody);
    }

    var reader = response.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while (true) {
      var result = await reader.read();
      if (result.done) break;

      buffer += decoder.decode(result.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop();

      for (var li = 0; li < lines.length; li++) {
        var line = lines[li];
        if (!line.startsWith('data: ')) continue;
        try {
          var data = JSON.parse(line.substring(6));
          if (data.type === 'delta') {
            fullText += data.text;
            assistantDiv.innerHTML = markdownToHtml(fullText);
            scrollToBottom();
          } else if (data.type === 'error') {
            throw new Error(data.text);
          }
        } catch(pe) {
          if (pe.message && pe.message.indexOf('API') < 0) throw pe;
        }
      }
    }
  } catch(e) {
    if (!fullText) {
      fullText = '[Error] ' + e.message;
      assistantDiv.innerHTML = '<p class="error">' + escapeHtml(e.message) + '</p>';
    }
  }

  assistantDiv.classList.remove('streaming');
  var aTimestamp = new Date().toISOString();
  chatHistory.push({ role: 'assistant', content: fullText, timestamp: aTimestamp });

  var timeDiv = document.createElement('div');
  timeDiv.className = 'msg-time';
  timeDiv.textContent = new Date(aTimestamp).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
  assistantDiv.appendChild(timeDiv);

  await saveChat();
  saveMemoBtn.disabled = false;

  isSending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// --- テキストエリア自動リサイズ ---
function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}
inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// --- 初期化 ---
(async function() {
  await loadChat();
  await loadContext();
  renderMessages();
  inputEl.focus();
})();
</script>
</body>
</html>
